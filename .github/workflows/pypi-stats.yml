name: PyPI stats

on:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/pypi-stats.yml"
      - "scripts/pypi_stats.py"
      - "README.md"
      - "pyproject.toml"
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pypi-stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-pypi-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypistats

      - name: Generate report
        run: python scripts/pypi_stats.py

      - name: Show report
        run: cat stats/pypi_downloads.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-download-stats
          path: stats/pypi_downloads.md
          
