name: PyPI stats  # generates download metrics; commits results for stable links

on:
  push:
    branches:
      - develop
      - master
    # run on develop (testing) and master (canonical/public)
    paths:
      - ".github/workflows/pypi-stats.yml"
      - "scripts/pypi_stats.py"
      - "README.md"
      - "pyproject.toml"
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write  # needed to commit generated files

concurrency:
  group: pypi-stats-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-pypi-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypistats

      - name: Generate stats files
        run: |
          python scripts/pypi_stats.py

      - name: Commit updated stats files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/pypi_downloads.md stats/pypi_impact_one_liner.md stats/pypi_impact_one_liner.txt
          git diff --cached --quiet || git commit -m "Update PyPI stats"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-download-stats
          # Artifacts also kept for inspection
          path: |
            stats/pypi_downloads.md
            stats/pypi_impact_one_liner.md
            stats/pypi_impact_one_liner.txt
